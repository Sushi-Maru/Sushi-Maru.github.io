<style>
body {
    margin: 0;

    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);

    justify-content: center;
    align-items: center;

    min-height: 100vh; /* 🔥 เปลี่ยนจาก height */
    padding: 20px;     /* 🔥 กันติดขอบ */
}

.card h3 {
    font-size: clamp(16px, 2vw, 26px);
}


.card h1 {

    top: 0;
    background: #2c2c54;
    padding-bottom: 10px;
}

.timer-bar {
    position: fixed;   /* 🔥 ลอยอยู่บนสุด */
    top: 20px;
    left: 50%;
    transform: translateX(-50%);

    background: linear-gradient(135deg, #3cff00, #00d21c);
    color: #000;

    padding: 12px 30px;
    border-radius: 30px;

    font-size: clamp(24px, 3vw, 48px);
    font-weight: bold;

    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    z-index: 999;
}

/* กล่องหลัก */
.card {
    background: #2c2c54;
    padding: 30px;
    border-radius: 20px;
    width: 700px; /* จาก 500 → 700 */
    max-width: 90%;
    max-height: 90vh;   /* 🔥 จำกัดความสูง */
    overflow-y: auto;   /* 🔥 scroll ได้ */
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 0.4s ease;
}

/* animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9);}
    to { opacity: 1; transform: scale(1);}
}

/* ปุ่ม */
button {
    display: block;
    width: 100%;
    margin: 8px 0;
    font-size: clamp(16px, 2vw, 24px);
    padding: clamp(10px, 1.5vw, 18px);

    border: none;
    border-radius: 20px; /* 🔥 โค้งมากขึ้น */

    background: linear-gradient(135deg, #ff9a3c, #ff4e00); /* 🔥 สีไล่ */
    color: white;
    font-weight: bold;

    cursor: pointer;

    transition: all 0.2s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3); /* 🔥 เงา */
}

/* hover */
button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* กด */
button:active {
    transform: scale(0.95);
}

/* ถูก */
.correct {
    background: linear-gradient(135deg, #4caf50, #2e7d32) !important;
}

/* ผิด */
.wrong {
    background: linear-gradient(135deg, #ff5f5f, #c62828) !important;
}

/* ปุ่ม start */
.start-btn {
    width: auto;
    margin: 20px auto;
    padding: 14px 30px;
    font-size: 18px;
}

/* status */
.status {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

/* progress */
.progress-bar {
    width: 100%;
    height: 10px;
    background: #555;
    border-radius: 10px;
    margin-bottom: 15px;
}

#progress {
    height: 100%;
    width: 0%;
    background: #00ffcc;
    border-radius: 10px;
    transition: 0.3s;
}

/* fade เปลี่ยนหน้า */
.fade {
    animation: fadeIn 0.3s ease;
}

/* ripple effect */
button {
    position: relative;
    overflow: hidden;
}

button::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: rgba(255,255,255,0.5);
    display: block;
    border-radius: 50%;
    opacity: 0;
    transform: scale(1);
}

button:active::after {
    animation: ripple 0.4s ease;
}

@keyframes ripple {
    from {
        opacity: 1;
        transform: scale(1);
    }
    to {
        opacity: 0;
        transform: scale(15);
    }
}

/* combo effect */
.combo-up {
    color: #ffcc00;
    transform: scale(1.3);
    transition: 0.2s;
}

/* hp damage */
.damage {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* progress ลื่น */
#progress {
    transition: width 0.4s ease;
}

/* เอฟเฟกต์ */
.correct { background: #28a745 !important; }
.wrong { background: #dc3545 !important; }
</style>

        <button onclick="playSound(clickSound); selectCategory('chapter2')">บทที่ 2 อ่านคิดและเขียนเพื่อการเรียนรู้ตลอดชีวิต</button>

        <button onclick="playSound(clickSound); selectCategory('chapter6')">บทที่ 6 การเขียนบันทึกรายงานการประชุมทางธุรกิจ</button>

        <button onclick="playSound(clickSound); selectCategory('chapter8_2')">บทที่ 8 (2) การเล่าเรื่องเทคนิคการเล่าเรื่องเพื่อใช้งานในทางธุรกิจ</button>
        <button onclick="playSound(clickSound); selectCategory('chapter9')">บทที่ 9 การใช้ภาษาและสื่แสมัยใหม่เพื่อการโน้มน้าวใจในงานธุรกิจ</button>
    </div>`;
}

function showExplanation() {
    let correctText = questions[current].choices[questions[current].answer];

    let exp = document.createElement("div");
    exp.innerHTML = `✅ คำตอบที่ถูก: <b>${correctText}</b>`;
    exp.style.marginTop = "15px";
    exp.style.fontSize = "18px";

    document.querySelector(".card").appendChild(exp);
}

/* เลือก chapter */
function selectCategory(cat) {
    questions = shuffleArray(allQuestions[cat]); // 🔥 โหลดคำถาม
    startGame();
}

/* start */
function startGame() {
    current = 0;
    score = 0;
    hp = 3;
    combo = 0;
    gameOver = false; // 🔥 reset

    bgm.play().catch(()=>{});
    showQuestion();
}

/* question */
function showQuestion() {

    if(!questions[current]){
        endGame();
        return;
    }

    clearInterval(timer); // 🔥 กัน timer ซ้อน
    time = 10;            // 🔥 สำคัญมาก

    document.getElementById("game").innerHTML = `
    <div class="timer-bar">⏱ ${time}</div>

    <div class="status">
        <span>❤️ HP: ${hp}</span>
        <span>🎯 Score: ${score}</span>
        <span>🔥 Combo: ${combo}</span>
    </div>

    <div class="card">
        <h3>${questions[current].q}</h3>
        <div id="choices"></div>
    </div>
`;

    // สร้างตัวเลือก
    let choicesDiv = document.getElementById("choices");

    questions[current].choices.forEach((c, i) => {
        let btn = document.createElement("button");
        btn.innerText = c;
        btn.onclick = () => answer(btn, i === questions[current].answer);
        choicesDiv.appendChild(btn);
    });

    // 🔥 เริ่ม timer หลัง render เสร็จ
    timer = setInterval(() => {

        if(gameOver) return;

        time--;

        let timerEl = document.querySelector(".timer-bar");

        if(timerEl){
            timerEl.innerText = "⏱ " + time;

            if(time <= 3){
                timerEl.style.background = "red";
            } else {
                timerEl.style.background = "green";
            }
        }

        if(time <= 3){
    playSound(clickSound); // ติ๊ก ๆ ๆ
}

        if(time <= 0) {
    clearInterval(timer);

    hp--;
    combo = 0;

    // 🔥 แสดงเฉลยก่อน
    showExplanation();

    setTimeout(() => {
        if(hp <= 0){
            endGame();
            return;
        }
        nextQuestion();
    }, 1500);

    return;
}

    }, 1000);
    
}


function answer(btn, isCorrect) {
    if(gameOver) return;

    playSound(clickSound);

    let buttons = document.querySelectorAll("button");

    // 🔥 ปิดปุ่ม
    buttons.forEach(b => b.disabled = true);

    // 🔥 highlight คำตอบที่ถูก
    buttons.forEach(b => {
        if(b.innerText === questions[current].choices[questions[current].answer]){
            b.classList.add("correct");
        }
    });

    if(isCorrect) {
        btn.classList.add("correct");
        playSound(correctSound);

        combo++;
        score += 1 + combo;

    } else {
        btn.classList.add("wrong");
        playSound(wrongSound);

        hp--;
        combo = 0;
    }

    clearInterval(timer);

    // 🔥 แสดงเฉลย
    showExplanation();

    setTimeout(() => {
        nextQuestion();
    }, 1500); // 🔥 หน่วงให้เห็นเฉลย
}

/* next */
function nextQuestion() {
    current++;

    if(current >= questions.length || hp <= 0) {
        endGame();
    } else {
        showQuestion();
    }
}

/* end */
function endGame() {

    gameOver = true;      // 🔥 ล็อกก่อน
    clearInterval(timer); // 🔥 หยุดเวลา
    bgm.pause();

    let message = "";
    if(score > 30) message = "สื่อสารระดับเทพ 🔥";
    else if(score > 15) message = "ดีมาก 👍";
    else message = "ฝึกเพิ่มอีกนิด 📚";

    document.getElementById("game").innerHTML = `
    <div class="card">
        <h2>🏆 จบเกม</h2>
        <p>คะแนน: ${score}</p>
        <p>${message}</p>
        <button onclick="showMenu()">เล่นใหม่</button>
    </div>`;
}

showMenu();
</script>
